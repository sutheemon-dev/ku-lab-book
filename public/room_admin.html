                    <ul class="dropdown-menu dropdown-menu-end">

                        <li><a class="dropdown-item" href="#">ผู้ดูแลระบบ</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>
    <!-- Navbar สำหรับมือถือ -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top d-lg-none">
        <div class="container-fluid ">
            <a class="navbar-brand " href="#">
                <img src="img/KU_SubLogo.png" alt="Logo" width="30" height="30">
                <div class="brand-text">
                    <div class="main">ระบบจองคอมพิวเตอร์</div>
                    <div class="sub">มหาวิทยาลัยเกษตรศาสตร์ วิทยาเขตบางเขน</div>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <div>
                        <!-- Profile Section -->
                        <div class="profile-section">
                            <img src="https://via.placeholder.com/40" alt="Profile Picture">
                            <div class="profile-info">
                                <h6>ชื่อผู้ใช้</h6>
                                <p>user@example.com</p>
                            </div>
                        </div>
                        <!-- Menu Items -->
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active" href="#"><i class="fa-solid fa-home"></i> หน้าแรก</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#"><i class="fa-solid fa-info-circle"></i> เกี่ยวกับเรา</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#"><i class="fa-solid fa-address-book"></i> ติดต่อเรา</a>
                            </li>
                            <li class="nav-item dropdown">
                                <button class="btn login-btn dropdown-toggle text-white" type="button"
                                    data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fa-solid fa-sign-in-alt"></i> เข้าสู่ระบบ
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">นักศึกษา</a></li>
                                    <li><a class="dropdown-item" href="#">ผู้ดูแล</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                    <!-- Logout Button -->
                    <button class="btn logout-btn">
                        <i class="fa-solid fa-sign-out-alt"></i> ออกจากระบบ
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <!-- เพิ่ม spacer เพื่อป้องกันการทับซ้อน -->
    <div class="mobile-nav-spacer"></div>
    <!-- ห้องแอดมิน -->
    <div class="d-flex nav-link-admin ">
        <button type="button" class="admin-btn">ระบบจัดการแอดมิน</button>
        <button type="button" class="room-btn">ห้องคอมพิวเตอร์</button>
    </div>

    <div class="container">
        <div class="room-computer"></div>
    </div>

    <script>
        const room = document.querySelector('.room-computer');

        const statuses = ['ว่าง', 'จองแล้ว', 'กำลังใช้งาน', 'ซ่อมบำรุง'];
        const systems = [
            { name: 'Mac', icon: '🍎' },
            { name: 'Windows', icon: '🪟' },
            null  // พื้นที่ว่าง ไม่มีเครื่อง
        ];

        // การสร้างเครื่องคอมพิวเตอร์ในห้อง
        for (let i = 1; i <= 108; i++) {  // จำนวนเครื่องในห้อง 12 * 9 = 108
            const pcId = `PC-${String(i).padStart(3, '0')}`;
            const status = statuses[Math.floor(Math.random() * statuses.length)];
            const system = systems[Math.floor(Math.random() * systems.length)];

            const div = document.createElement('div');
            div.className = `pc-box ${system ? `status-${status}` : 'empty-box'}`;
            div.id = pcId;

            div.innerHTML = `
                ${system ? `<div class="status-label">${status}</div>` : ''}
                <button class="edit-btn">แก้ไข</button>
                <strong class="pc-id">${pcId}</strong>
                ${system ? `
                    <div class="pc-icon">${system.icon}</div>
                    <div class="pc-type">${system.name}</div>
                ` : ''}
            `;

            room.appendChild(div);
        }
    </script>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu" crossorigin="anonymous">
        </script>
    <script src="/public/js/admin.js"></script>

</body>

</html>
